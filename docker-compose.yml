version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acme-send-orders
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    restart: unless-stopped
    networks:
      - acme-network

networks:
  acme-network:
    driver: bridge